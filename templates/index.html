<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Wine Quality AI - Predictor</title>
    <link rel="icon" type="image/x-icon" href="static/assets/favicon.ico" />
    <!-- Google fonts-->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Core theme CSS (includes Bootstrap)-->
    <link href="static/css/styles.css" rel="stylesheet" />
    <style>
        :root {
            --wine-red: #800020;
            --wine-dark: #4d0012;
            --gold: #D4AF37;
            --gold-light: #f1d592;
            --cream: #F8F9FA;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--cream);
            color: #2c3e50;
            line-height: 1.6;
        }

        .masthead {
            background: linear-gradient(135deg, var(--wine-dark) 0%, var(--wine-red) 100%);
            padding: 120px 0;
            color: white;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--gold);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            letter-spacing: -1px;
        }

        .subheading {
            font-weight: 300;
            font-size: 1.25rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--gold-light);
            opacity: 0.9;
        }

        .form-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.1);
            padding: 50px;
            margin-top: -60px;
            margin-bottom: 60px;
            border-top: 6px solid var(--gold);
        }

        .form-title {
            font-family: 'Playfair Display', serif;
            color: var(--wine-red);
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 40px;
            text-align: center;
            letter-spacing: -0.5px;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 1.2px;
            display: block;
        }

        .form-control {
            border-radius: 10px;
            border: 2px solid #eee;
            padding: 14px;
            font-weight: 500;
            color: #444;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .form-control:focus {
            border-color: var(--wine-red);
            box-shadow: 0 5px 15px rgba(128, 0, 32, 0.08);
            transform: translateY(-2px);
        }

        .btn-predict {
            background: linear-gradient(to right, var(--wine-red), var(--wine-dark));
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.4s;
            display: block;
            margin: 40px auto 0;
            width: 100%;
            max-width: 320px;
            cursor: pointer;
        }

        .btn-predict:hover {
            background: var(--wine-dark);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(128, 0, 32, 0.3);
            color: var(--gold);
        }

        .footer {
            padding: 40px 0;
            background: #eee;
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <!-- Page Header-->
    <header class="masthead">
        <div class="container">
            <h1>Wine Quality AI</h1>
            <p class="subheading">Predict premium wine quality using advanced machine learning</p>
        </div>
    </header>

    <!-- Main Content-->
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="form-container">
                    <h2 class="form-title">Enter Chemical Analysis Data</h2>
                    
                    {% if error %}
                    <div class="alert alert-danger mb-4" role="alert" style="border-radius: 10px; border-left: 5px solid #8b0000;">
                        <i class="fas fa-exclamation-circle me-2"></i> {{ error }}
                    </div>
                    {% endif %}

                    <form action="/predict" method="post">
                        <div class="row g-4">
                            <!-- Column 1 -->
                            <div class="col-md-4">
                                <label class="form-label">Fixed Acidity</label>
                                <input type="text" name="fixed_acidity" class="form-control" placeholder="e.g. 7.4" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Volatile Acidity</label>
                                <input type="text" name="volatile_acidity" class="form-control" placeholder="e.g. 0.70" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Citric Acid</label>
                                <input type="text" name="citric_acid" class="form-control" placeholder="e.g. 0.00" required>
                            </div>

                            <!-- Column 2 -->
                            <div class="col-md-4">
                                <label class="form-label">Chlorides</label>
                                <input type="text" name="chlorides" class="form-control" placeholder="e.g. 0.076" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Total Sulfur Dioxide</label>
                                <input type="text" name="total_sulfur_dioxide" class="form-control" placeholder="e.g. 34.0" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Density</label>
                                <input type="text" name="density" class="form-control" placeholder="e.g. 0.9978" required>
                            </div>

                            <!-- Final Row -->
                            <div class="col-md-6">
                                <label class="form-label">Sulphates</label>
                                <input type="text" name="sulphates" class="form-control" placeholder="e.g. 0.56" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Alcohol Content</label>
                                <input type="text" name="alcohol" class="form-control" placeholder="e.g. 9.4" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-predict">PREDICT QUALITY</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer-->
    <footer class="footer">
        <div class="container text-center">
            <p class="text-muted">Built with MLOps and Machine Learning Excellence</p>
        </div>
    </footer>

    <!-- Bootstrap core JS-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
