<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Wine Quality AI - Predictor</title>
    <link rel="icon" type="image/x-icon" href="/static/assets/favicon.ico" />
    <!-- Google fonts-->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <!-- Core theme CSS (includes Bootstrap)-->
    <link href="/static/css/styles.css" rel="stylesheet" />
    <style>
        :root {
            --wine-red: #800020;
            --wine-dark: #4d0012;
            --gold: #D4AF37;
            --gold-light: #f1d592;
            --cream: #F8F9FA;
            --glass-bg: rgba(255, 255, 255, 0.85);
        }

        body {
            font-family: 'Poppins', sans-serif !important;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('/static/assets/img/generated_bg.jpg') no-repeat center center fixed !important;
            background-size: cover !important;
            color: #2c3e50 !important;
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .masthead {
            position: relative;
            background: url('https://images.unsplash.com/photo-1510850478918-63658a48bf2e?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') no-repeat !important;
            background-size: cover !important;
            background-position: center !important;
            padding: 160px 0 !important;
            color: white !important;
            text-align: center;
        }

        .masthead::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(77, 0, 18, 0.9) 0%, rgba(128, 0, 32, 0.7) 100%) !important;
            z-index: 1;
        }

        .masthead .container {
            position: relative;
            z-index: 2;
        }

        h1 {
            font-family: 'Playfair Display', serif !important;
            font-size: 5rem !important;
            font-weight: 700 !important;
            margin-bottom: 0.5rem;
            color: var(--gold) !important;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5) !important;
            letter-spacing: -1.5px;
        }

        .subheading {
            font-weight: 300 !important;
            font-size: 1.4rem !important;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--gold-light) !important;
            opacity: 0.95 !important;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .form-container {
            background: var(--glass-bg) !important;
            backdrop-filter: blur(10px) !important;
            -webkit-backdrop-filter: blur(10px) !important;
            border-radius: 30px !important;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25) !important;
            padding: 60px !important;
            margin-top: -80px !important;
            margin-bottom: 80px !important;
            border: 1px solid rgba(255, 255, 255, 0.3) !important;
            position: relative;
        }

        .form-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 6px;
            background: var(--gold);
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
        }

        .form-title {
            font-family: 'Playfair Display', serif;
            color: var(--wine-red);
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 50px;
            text-align: center;
            letter-spacing: -0.5px;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.8rem;
            color: #555;
            text-transform: uppercase;
            margin-bottom: 12px;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
        }

        .form-label i {
            margin-right: 8px;
            color: var(--wine-red);
            font-size: 0.9rem;
        }

        .form-control {
            border-radius: 15px;
            border: 2px solid rgba(0,0,0,0.05);
            padding: 16px;
            font-weight: 500;
            color: #333;
            background: rgba(255,255,255,0.9);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .form-control:focus {
            border-color: var(--wine-red);
            box-shadow: 0 10px 20px rgba(128, 0, 32, 0.1);
            transform: translateY(-3px);
            background: white;
        }

        .btn-predict {
            background: linear-gradient(135deg, var(--wine-red), var(--wine-dark));
            color: white;
            border: none;
            padding: 20px 50px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: all 0.5s;
            display: block;
            margin: 50px auto 0;
            width: 100%;
            max-width: 380px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(128, 0, 32, 0.25);
        }

        .btn-predict:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 35px rgba(128, 0, 32, 0.4);
            color: var(--gold);
        }

        .footer {
            padding: 60px 0;
            background: rgba(0,0,0,0.03);
            border-top: 1px solid rgba(0,0,0,0.05);
        }

        @media (max-width: 768px) {
            h1 { font-size: 3rem; }
            .form-container { padding: 30px; }
        }
    </style>
</head>
<body>
    <!-- Page Header-->
    <header class="masthead">
        <div class="container" data-aos="zoom-in" data-aos-duration="1200">
            <h1>Wine Quality AI</h1>
            <p class="subheading">Predict premium wine quality using advanced machine learning</p>
        </div>
    </header>

    <!-- Main Content-->
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="form-container" data-aos="fade-up" data-aos-delay="200">
                    <h2 class="form-title">Enter Chemical Analysis Data</h2>
                    
                    {% if error %}
                    <div class="alert alert-danger mb-4" role="alert" style="border-radius: 15px; border-left: 8px solid #8b0000; background: rgba(255,255,255,0.9);">
                        <i class="fas fa-exclamation-triangle me-2"></i> {{ error }}
                    </div>
                    {% endif %}

                    <form action="/predict" method="post">
                        <div class="row g-4">
                            <!-- Row 1 -->
                            <div class="col-md-4" data-aos="fade-right" data-aos-delay="300">
                                <label class="form-label"><i class="fas fa-flask"></i> Fixed Acidity</label>
                                <input type="text" name="fixed_acidity" class="form-control" placeholder="e.g. 7.4" required>
                            </div>
                            <div class="col-md-4" data-aos="fade-up" data-aos-delay="350">
                                <label class="form-label"><i class="fas fa-wind"></i> Volatile Acidity</label>
                                <input type="text" name="volatile_acidity" class="form-control" placeholder="e.g. 0.70" required>
                            </div>
                            <div class="col-md-4" data-aos="fade-left" data-aos-delay="400">
                                <label class="form-label"><i class="fas fa-lemon"></i> Citric Acid</label>
                                <input type="text" name="citric_acid" class="form-control" placeholder="e.g. 0.00" required>
                            </div>

                            <!-- Row 2 -->
                            <div class="col-md-4" data-aos="fade-right" data-aos-delay="450">
                                <label class="form-label"><i class="fas fa-vial"></i> Chlorides</label>
                                <input type="text" name="chlorides" class="form-control" placeholder="e.g. 0.076" required>
                            </div>
                            <div class="col-md-4" data-aos="fade-up" data-aos-delay="500">
                                <label class="form-label"><i class="fas fa-cloud"></i> Total SO₂</label>
                                <input type="text" name="total_sulfur_dioxide" class="form-control" placeholder="e.g. 34.0" required>
                            </div>
                            <div class="col-md-4" data-aos="fade-left" data-aos-delay="550">
                                <label class="form-label"><i class="fas fa-weight-hanging"></i> Density</label>
                                <input type="text" name="density" class="form-control" placeholder="e.g. 0.9978" required>
                            </div>

                            <!-- Row 3 -->
                            <div class="col-md-6" data-aos="fade-right" data-aos-delay="600">
                                <label class="form-label"><i class="fas fa-atom"></i> Sulphates</label>
                                <input type="text" name="sulphates" class="form-control" placeholder="e.g. 0.56" required>
                            </div>
                            <div class="col-md-6" data-aos="fade-left" data-aos-delay="650">
                                <label class="form-label"><i class="fas fa-percent"></i> Alcohol Content</label>
                                <input type="text" name="alcohol" class="form-control" placeholder="e.g. 9.4" required>
                            </div>
                        </div>

                        <div class="text-center" data-aos="zoom-in" data-aos-delay="800">
                            <button type="submit" class="btn btn-predict">PREDICT QUALITY</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer-->
    <footer class="footer">
        <div class="container text-center">
            <p class="text-muted mb-0">Built with MLOps and Machine Learning Excellence</p>
            <div class="mt-3">
                <i class="fab fa-python me-3"></i>
                <i class="fas fa-brain me-3"></i>
                <i class="fas fa-microchip"></i>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({
            once: true,
            duration: 1000,
            easing: 'ease-out-cubic'
        });
    </script>
</body>
</html>
